<div style="padding: 24px;">
  <h1 style="margin-bottom: 24px;">Dashboard</h1>

  <div style="display: flex; gap: 24px; flex-wrap: wrap;">

    <div style="background:#1f78c1; color:#fff; border-radius:16px; padding:24px; min-width:200px;">
      <h3 style="margin:0 0 16px;">Total Farmers</h3>
      <p style="font-size:28px; font-weight:bold; margin:0;">{{ totalFarmers() }}</p>
    </div>

    <div style="background:#2e7d32; color:#fff; border-radius:16px; padding:24px; min-width:200px;">
      <h3 style="margin:0 0 16px;">Active Farmers</h3>
      <p style="font-size:28px; font-weight:bold; margin:0;">{{ activeFarmers() }}</p>
    </div>

    <div style="background:#e8730a; color:#fff; border-radius:16px; padding:24px; min-width:200px;">
      <h3 style="margin:0 0 16px;">Milk Collection</h3>
      <p style="font-size:28px; font-weight:bold; margin:0;">{{ totalMilk() }} L</p>
    </div>

    <div style="background:#8e24aa; color:#fff; border-radius:16px; padding:24px; min-width:200px;">
      <h3 style="margin:0 0 16px;">Total Payments</h3>
      <p style="font-size:28px; font-weight:bold; margin:0;">Rs. {{ totalPayments() }}</p>
    </div>

  </div>
</div>
