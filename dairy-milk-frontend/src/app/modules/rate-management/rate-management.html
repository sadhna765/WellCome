<div class="container mt-4 rate-mgmt">

  <div class="card shadow">
    <div class="card-header rate-header text-white">
      <h5 class="mb-0">Module 3 — Rate Management</h5>
    </div>

    <div class="card-body">

      <!-- Add / Edit Rate Form -->
      <div class="form-box mb-4">
        <h6 class="form-title">{{ editingId ? 'Edit Rate Slab' : 'Add New Rate Slab' }}</h6>

        <div class="row g-3">
          <div class="col-md-3">
            <label class="form-label">Milk Type</label>
            <select class="form-select" [(ngModel)]="form.milkType">
              <option value="COW">Cow</option>
              <option value="BUFFALO">Buffalo</option>
            </select>
          </div>

          <div class="col-md-2">
            <label class="form-label">Min Fat %</label>
            <input type="number" step="0.1" class="form-control" [(ngModel)]="form.minFat" placeholder="0.0" />
          </div>

          <div class="col-md-2">
            <label class="form-label">Max Fat %</label>
            <input type="number" step="0.1" class="form-control" [(ngModel)]="form.maxFat" placeholder="0.0" />
          </div>

          <div class="col-md-3">
            <label class="form-label">Rate (₹/Litre)</label>
            <input type="number" step="0.5" class="form-control" [(ngModel)]="form.ratePerLitre" placeholder="0.0" />
          </div>

          <div class="col-md-2 d-flex align-items-end gap-2">
            <button class="btn btn-primary flex-fill" (click)="save()">
              {{ editingId ? 'Update' : 'Add' }}
            </button>
            <button *ngIf="editingId" class="btn btn-secondary" (click)="resetForm()">Cancel</button>
          </div>
        </div>
      </div>

      <!-- Filter -->
      <div class="d-flex align-items-center gap-2 mb-3">
        <label class="form-label mb-0 fw-bold">Filter:</label>
        <select class="form-select w-auto" [(ngModel)]="filterType" (ngModelChange)="loadRates()">
          <option value="">All</option>
          <option value="COW">Cow</option>
          <option value="BUFFALO">Buffalo</option>
        </select>
      </div>

      <!-- Rate Chart Table -->
      <div class="table-responsive">
        <table class="table table-bordered table-hover align-middle">
          <thead class="table-light">
            <tr>
              <th>Milk Type</th>
              <th>Fat Range (%)</th>
              <th>Rate (₹/Litre)</th>
              <th>Status</th>
              <th style="width: 160px;">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngIf="loading">
              <td colspan="5" class="text-center text-muted py-4">Loading...</td>
            </tr>
            <tr *ngIf="!loading && rates.length === 0">
              <td colspan="5" class="text-center text-muted py-4">No rate slabs added yet.</td>
            </tr>
            <tr *ngFor="let r of rates">
              <td>
                <span class="badge" [class.bg-success]="r.milkType === 'COW'"
                                    [class.bg-warning]="r.milkType === 'BUFFALO'">
                  {{ r.milkType }}
                </span>
              </td>
              <td>{{ r.minFat }} – {{ r.maxFat }}</td>
              <td class="fw-bold">₹ {{ r.ratePerLitre }}</td>
              <td>
                <span class="badge" [class.bg-primary]="r.active" [class.bg-secondary]="!r.active">
                  {{ r.active ? 'Active' : 'Inactive' }}
                </span>
              </td>
              <td>
                <button class="btn btn-sm btn-outline-primary me-1" (click)="edit(r)">Edit</button>
                <button class="btn btn-sm btn-outline-danger" (click)="remove(r)">Delete</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>
</div>

<style>
  .rate-mgmt .rate-header {
    background: linear-gradient(90deg, #5b3fc4, #7a5cf0);
  }
  .rate-mgmt .form-box {
    background: #f6f4ff;
    border: 1px solid #e3ddf7;
    border-radius: 10px;
    padding: 18px;
  }
  .rate-mgmt .form-title {
    color: #5b3fc4;
    font-weight: 600;
    margin-bottom: 14px;
  }
  .rate-mgmt .btn-primary {
    background: #5b3fc4;
    border-color: #5b3fc4;
  }
  .rate-mgmt .btn-primary:hover {
    background: #4a32a3;
    border-color: #4a32a3;
  }
  .rate-mgmt .badge.bg-warning {
    color: #fff;
  }
</style>
